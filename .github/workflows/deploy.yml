name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  # ── Job 1: TypeScript check ──────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: Verificar TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Job 2: Deploy al VPS (solo si TypeScript pasa) ──────────
  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Deploy via SSH (IPv4 forzado)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -4 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -4 -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o AddressFamily=inet \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /var/www/todasmiscosas && git fetch origin && git reset --hard origin/master && bash /var/www/todasmiscosas/deploy.sh"
