name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  # ── Job 1: TypeScript check ──────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: Verificar TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Job 2: Deploy al VPS (solo si TypeScript pasa) ──────────
  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/todasmiscosas && git fetch origin && git reset --hard origin/master && bash /var/www/todasmiscosas/deploy.sh
