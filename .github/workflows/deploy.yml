name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  # ── Job 1: TypeScript check ──────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: Verificar TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Job 2: Deploy al VPS (solo si TypeScript pasa) ──────────
  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Deploy via SSH (IPv4 forzado, con reintentos)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -4 -H "2.24.105.151" >> ~/.ssh/known_hosts 2>/dev/null || true

          for attempt in 1 2 3; do
            echo "🔄 Intento $attempt/3..."
            ssh -4 -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o AddressFamily=inet \
              -o ConnectTimeout=30 \
              "${{ secrets.VPS_USER }}@2.24.105.151" \
              "cd /var/www/todasmiscosas && git fetch origin && git reset --hard origin/master && bash /var/www/todasmiscosas/deploy.sh" \
            && echo "✅ Deploy OK" && exit 0
            echo "⚠️ Intento $attempt fallido, esperando 15s..."
            sleep 15
          done
          echo "❌ Deploy falló después de 3 intentos"
          exit 1
