name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          script: |
            cd /var/www/todasmiscosas && git reset --hard HEAD && /var/www/todasmiscosas/deploy.sh
            cd /var/www/todasmiscosas/backend && node src/db/add-disponibilidad.js && node src/db/add-categoria-seguridad.js && node src/db/add-moneda-perfil.js && node src/db/add-recordatorios-extensiones.js && node src/db/add-bloqueo-usuarios.js && node src/db/add-auth-otp.js && node src/db/add-perfil-inactividad.js && node src/db/add-dni.js
