name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  # ── Job 1: TypeScript check ──────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: Verificar TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Job 2: Deploy al VPS (corre directo en el VPS via self-hosted runner) ──
  deploy:
    name: Deploy al VPS
    runs-on: self-hosted
    needs: typecheck
    steps:
      - name: Pull y build
        run: |
          cd /var/www/todasmiscosas
          git fetch origin
          git reset --hard origin/master
          cd frontend && npm ci --prefer-offline && npm run build
          cd .. && pm2 restart all
          echo "✅ Deploy OK"
